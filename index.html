<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Sidebar with Tailwind</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body class="bg-gray-100">
  <aside class="sidebar bg-bgColor text-textColor h-screen w-40 fixed flex flex-col p-4">
    <div class="flex items-center space-x-3 mb-6">
      <img src="logo.png" alt="Logo" class="w-8 h-8">
      <h1 class="text-lg font-semibold">Sell Tech IND</h1>
    </div>
    
    <ul class="space-y-4">
      
      <li class="sidebar-item flex items-center space-x-4 p-2 rounded-md cursor-pointer" onclick="setActive(this)">
        <i class="sidebar-icon fas fa-home text-xl"></i>
        <span class="sidebar-text">Home</span>
      </li>
      <li class="sidebar-item flex items-center space-x-4 p-2 rounded-md cursor-pointer" onclick="setActive(this)">
        <i class="sidebar-icon fas fa-tasks text-xl"></i>
        <span class="sidebar-text">Projects</span>
      </li>
      <li class="sidebar-item flex items-center space-x-4 p-2 rounded-md cursor-pointer" onclick="setActive(this)">
        <i class="sidebar-icon fas fa-comments text-xl"></i>
        <span class="sidebar-text">Conversation</span>
      </li>
      <li class="sidebar-item flex items-center space-x-4 p-2 rounded-md cursor-pointer" onclick="setActive(this)">
        <i class="sidebar-icon fas fa-chart-line text-xl"></i>
        <span class="sidebar-text">Analytics</span>
      </li>
      <li class="sidebar-item flex items-center space-x-4 p-2 rounded-md cursor-pointer" onclick="setActive(this)">
        <i class="sidebar-icon fas fa-calendar-alt text-xl"></i>
        <span class="sidebar-text">Events</span>
      </li>
    </ul>
  </aside>

  <script src="script.js"></script>
</body>
</html>
